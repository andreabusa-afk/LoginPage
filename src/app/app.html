<div class="page">
  <div class="card">

    <h2 *ngIf="isLogin">Login</h2>
    <h2 *ngIf="!isLogin">Register</h2>

    <!-- LOGIN -->
    <div *ngIf="isLogin">

      <div class="input-group">
        <label>Email</label>
        <input [(ngModel)]="email" type="email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input [(ngModel)]="password" type="password">
      </div>

      <button (click)="Validate()">Sign In</button>

      <p class="switch">
        No account? 
        <span (click)="switchForm()">Register</span>
      </p>

    </div>

    <!-- REGISTER -->
    <div *ngIf="!isLogin">

      <div class="input-group">
        <label>Email</label>
        <input [(ngModel)]="regEmail" type="email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input [(ngModel)]="regPassword" type="password">
      </div>

      <div class="input-group">
        <label>Role</label>
        <select [(ngModel)]="role">
          <option value="student">Student</option>
          <option value="instructor">Instructor</option>
        </select>
      </div>

      <button (click)="register()">Register</button>

      <p class="switch">
        Already have an account?
        <span (click)="switchForm()">Login</span>
      </p>

    </div>

    <p class="message">{{message}}</p>

  </div>
</div>
